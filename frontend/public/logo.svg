<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
  
  <!-- Camera icon -->
  <g filter="url(#glow)">
    <!-- Camera body -->
    <rect x="45" y="70" width="110" height="75" rx="10" fill="url(#logoGradient)" opacity="0.2" stroke="url(#logoGradient)" stroke-width="2"/>
    
    <!-- Lens -->
    <circle cx="100" cy="107" r="25" fill="url(#logoGradient)" opacity="0.3" stroke="url(#logoGradient)" stroke-width="2"/>
    <circle cx="100" cy="107" r="15" fill="url(#logoGradient)" opacity="0.5"/>
    <circle cx="100" cy="107" r="8" fill="#ffffff" opacity="0.8"/>
    
    <!-- Flash -->
    <rect x="130" y="80" width="15" height="10" rx="2" fill="url(#logoGradient)"/>
    
    <!-- Viewfinder -->
    <rect x="70" y="65" width="30" height="12" rx="3" fill="url(#logoGradient)" opacity="0.3" stroke="url(#logoGradient)" stroke-width="1.5"/>
  </g>
  
  <!-- JAGGER text -->
  <text x="100" y="170" text-anchor="middle" fill="url(#logoGradient)" font-family="Arial, sans-serif" font-size="16" font-weight="bold" letter-spacing="2">JAGGER SWAP</text>
</svg>

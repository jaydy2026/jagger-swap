version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://backend:8000}
    depends_on:
      - backend
    networks:
      - jagger-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=JAGGER SWAP
      - APP_VERSION=1.0.0
      - DEBUG=false
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - ANIMATION_ENABLED=false
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - uploads-data:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - jagger-network
    restart: unless-stopped

networks:
  jagger-network:
    driver: bridge

volumes:
  uploads-data:

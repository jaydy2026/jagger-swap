version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - jagger-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=JAGGER SWAP
      - APP_VERSION=1.0.0
      - DEBUG=false
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
    volumes:
      - uploads-data:/app/uploads
    networks:
      - jagger-network
    restart: unless-stopped

networks:
  jagger-network:
    driver: bridge

volumes:
  uploads-data:
